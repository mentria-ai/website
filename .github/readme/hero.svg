<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" role="img" aria-label="Mentria — browser-native AI tools that run on your device">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0d12"/>
      <stop offset="1" stop-color="#13161f"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ef3c5"/>
      <stop offset="1" stop-color="#5bd6ff"/>
    </linearGradient>
    <clipPath id="type">
      <rect x="62" y="186" width="0" height="40">
        <animate attributeName="width" values="0;0;760;760" keyTimes="0;0.12;0.7;1" dur="4.2s" begin="0s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="300" rx="18" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="17.5" fill="none" stroke="#ffffff14"/>

  <circle cx="42" cy="42" r="6.5" fill="#ff5f57"/>
  <circle cx="66" cy="42" r="6.5" fill="#febc2e"/>
  <circle cx="90" cy="42" r="6.5" fill="#28c840"/>
  <text x="1158" y="47" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" fill="#8a90a2">mentria.ai</text>

  <text x="60" y="160" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="88" font-weight="700" letter-spacing="3" fill="#e8eaf0">MENTRIA<tspan fill="#6ef3c5">_<animate attributeName="opacity" values="1;0" keyTimes="0;0.5" dur="1.05s" calcMode="discrete" repeatCount="indefinite"/></tspan></text>

  <g clip-path="url(#type)">
    <text x="62" y="216" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="29" fill="#8a90a2">browser-native AI &#183; runs on your device</text>
  </g>

  <rect x="60" y="244" width="0" height="3" rx="1.5" fill="url(#mint)">
    <animate attributeName="width" values="0;0;1080;1080" keyTimes="0;0.12;0.7;1" dur="4.2s" begin="0s" repeatCount="indefinite"/>
  </rect>
</svg>
